<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - VectraCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e11;
            --panel-bg: #151a22;
            --border-color: #2a323f;
            --accent-color: #ff3b30;
            --accent-hover: #e02d25;
            --text-main: #f0f3f6;
            --text-muted: #848e9c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 80px; border-bottom: 1px solid rgba(42, 50, 63, 0.4);
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-mark { width: 28px; height: 28px; flex-shrink: 0; }
        .logo h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; }
        .logo h1 span { color: var(--accent-color); }
        header a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        header a:hover { color: var(--text-main); }
        main { max-width: 560px; margin: 0 auto; padding: 60px 24px 100px; }
        h2.page-title { font-size: 2.2rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .lede { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 36px; }
        .contact-form { display: flex; flex-direction: column; gap: 14px; }
        .contact-input, .contact-textarea {
            background-color: var(--panel-bg); border: 1px solid var(--border-color);
            color: var(--text-main); padding: 14px; border-radius: 6px; font-size: 1rem;
            outline: none; transition: border-color 0.2s; font-family: 'Inter', sans-serif;
        }
        .contact-textarea { resize: vertical; min-height: 140px; }
        .contact-input:focus, .contact-textarea:focus { border-color: var(--accent-color); }
        .submit-btn {
            background-color: var(--accent-color); color: #fff; border: none; padding: 14px;
            font-size: 1rem; font-weight: 700; border-radius: 6px; cursor: pointer;
            transition: background-color 0.2s;
        }
        .submit-btn:hover { background-color: var(--accent-hover); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .status-msg { font-size: 0.85rem; margin-top: -4px; display: none; }
        .status-msg.error { color: var(--accent-color); }
        .status-msg.success { color: #4ade80; }
        footer { padding: 30px; text-align: center; border-top: 1px solid rgba(42, 50, 63, 0.3); font-size: 0.8rem; color: var(--text-muted); }
        @media (max-width: 640px) { header { padding: 20px 24px; } }
    </style>
    <link rel="icon" type="image/png" href="/logo.pn
</head>
<body>
    <header>
        <a class="logo" href="index.html"><svg class="logo-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><line x1="14" y1="61" x2="82" y2="61" stroke="#ff3b30" stroke-width="3" stroke-dasharray="4 5" opacity="0.55"/><path d="M22,45 L44,84 L86,32" fill="none" stroke="#f0f3f6" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/><path d="M44,61 L44,84 L86,32" fill="none" stroke="#ff3b30" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/><circle cx="44" cy="84" r="9" fill="#ff3b30"/></svg><h1>Vectra <span>Core</span></h1></a>
    </header>

    <main>
        <h2 class="page-title">Contact Us</h2>
        <p class="lede">Questions, feedback, or partnership interest — send us a message and we'll get back to you.</p>

        <form class="contact-form" id="contact-form">
            <input type="email" id="contact-email" class="contact-input" placeholder="Your email address" required>
            <textarea id="contact-message" class="contact-textarea" placeholder="What's on your mind?" required></textarea>
            <p class="status-msg error" id="contact-error">Something went wrong. Please try again.</p>
            <p class="status-msg success" id="contact-success">Message sent — thanks for reaching out.</p>
            <button type="submit" class="submit-btn" id="contact-submit-btn">Send Message</button>
        </form>
    </main>

    <footer>&copy; 2026 VectraCore Research.</footer>

    <script>
        const API_BASE_URL = window.location.protocol.startsWith('http')
            ? window.location.origin
            : 'http://127.0.0.1:5000';

        const form = document.getElementById('contact-form');
        const emailField = document.getElementById('contact-email');
        const messageField = document.getElementById('contact-message');
        const submitBtn = document.getElementById('contact-submit-btn');
        const errorMsg = document.getElementById('contact-error');
        const successMsg = document.getElementById('contact-success');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const email = emailField.value.trim();
            const message = messageField.value.trim();
            if (!email || !message) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const response = await fetch(`${API_BASE_URL}/api/submit-feedback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, message })
                });

                if (!response.ok) throw new Error('Submission failed');

                successMsg.style.display = 'block';
                form.reset();
            } catch (err) {
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            }
        });
    </script>
</body>
</html>
