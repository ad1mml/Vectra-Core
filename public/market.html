<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VectraCore | Market Monitor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; display: flex; flex-direction: column; background: #0b0e11; color: #fff; font-family: sans-serif; overflow: hidden; }

        header { height: 50px; background: #151a22; border-bottom: 1px solid #2a323f; display: flex; align-items: center; padding: 0 20px; }
        .logo { font-weight: 700; font-size: 1.2rem; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .logo-mark { width: 22px; height: 22px; flex-shrink: 0; }
        .logo-vectra { color: #ffffff; }
        .logo-core { color: #ff3b30; }
        .back-link { margin-left: 20px; color: #848e9c; text-decoration: none; font-size: 0.85rem; }
        .back-link:hover { color: #fff; }

        .workspace { flex: 1; display: flex; width: 100%; overflow: hidden; }

        .chart-container { width: 60%; height: 100%; border-right: 2px solid #2a323f; }

        .news-container { width: 40%; height: 100%; background: #151a22; }
    </style>
    <link rel="icon" type="image/png" href="/logo.pn
</head>
<body>

    <header>
        <a class="logo" href="index.html">
            <svg class="logo-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><line x1="14" y1="61" x2="82" y2="61" stroke="#ff3b30" stroke-width="3" stroke-dasharray="4 5" opacity="0.55"/><path d="M22,45 L44,84 L86,32" fill="none" stroke="#f0f3f6" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/><path d="M44,61 L44,84 L86,32" fill="none" stroke="#ff3b30" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/><circle cx="44" cy="84" r="9" fill="#ff3b30"/></svg>
            <span><span class="logo-vectra">Vectra</span><span class="logo-core">Core</span></span>
        </a>
    </header>

    <div class="workspace">
        <div class="chart-container" id="tv_chart"></div>

        <div class="news-container">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                {
                    "feedMode": "all_symbols",
                    "colorTheme": "dark",
                    "isTransparent": false,
                    "displayMode": "regular",
                    "width": "100%",
                    "height": "100%",
                    "locale": "en"
                }
                </script>
            </div>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
<script>
    new TradingView.widget({
        "container_id": "tv_chart",
        "autosize": true,
        "symbol": "FX_IDC:GBPUSD",
        "interval": "60",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "toolbar_bg": "#151a22",

        // These are what turn it from a bare price line into the real
        // TradingView experience:
        "allow_symbol_change": true,   // click the symbol name to search any market
        "hide_side_toolbar": false,    // drawing tools (trendlines, fib, etc.)
        "withdateranges": true,        // 1D/5D/1M/... range buttons
        "details": true,               // symbol info panel
        "hotlist": true,               // trending symbols panel
        "calendar": true,              // economic calendar tab
        "studies": [
            "STD;SMA",
            "Volume@tv-basicstudies"
        ],
        "support_host": "https://www.tradingview.com"
    });
</script>
</body>
</html>
