services:
  - type: web
    name: vectracore
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: FINNHUB_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: GEMINI_MODEL
        value: models/gemma-4-26b-a4b-it
      - key: GEMINI_FALLBACK_MODEL
        value: models/gemma-4-26b-a4b-it
      - key: FLASK_DEBUG
        value: "false"
